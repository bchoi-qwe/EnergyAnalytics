name: docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE_NAME: ghcr.io/${{ github.repository }}
      TEST_IMAGE: energyanalytics:test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.TEST_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --rm --name energyanalytics-smoke -p 8080:8080 $TEST_IMAGE

      - name: Smoke test app
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs energyanalytics-smoke
          exit 1

      - name: Stop smoke container
        if: always()
        run: docker rm -f energyanalytics-smoke || true

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub configuration
        if: github.event_name == 'push'
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || {
            echo "Missing repository variable DOCKERHUB_USERNAME" >&2
            exit 1
          }
          test -n "$DOCKERHUB_TOKEN" || {
            echo "Missing repository secret DOCKERHUB_TOKEN" >&2
            exit 1
          }

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract publish metadata
        if: github.event_name == 'push'
        id: publish_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/energyanalytics
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/energyanalytics
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push images
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.publish_meta.outputs.tags }}
          labels: ${{ steps.publish_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
